# aidoc 工具链配置文件
# ===========================
# 优先级: CLI 参数 > 配置文件 > 默认值
# 配置文件搜索顺序: ./aidoc.conf > ~/.config/aidoc/aidoc.conf

[llm]
# LLM 后端: ollama 或 openai
api = ollama

# 模型名称
# Ollama 示例: qwen3:8b, llama3.2:3b, deepseek-r1:32b
# OpenAI 示例: gpt-4o, gpt-4o-mini
model = qwen3:8b

# API 地址
# Ollama 默认: http://localhost:11434
# OpenAI 默认: https://api.openai.com/v1
api_url = http://localhost:11434

# OpenAI API Key（仅 openai 后端需要，也可通过环境变量 OPENAI_API_KEY 设置）
api_key =

# 生成参数
temperature = 0.3
timeout = 120
