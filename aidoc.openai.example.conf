# aidoc 工具链配置文件 - OpenAI API 示例
# ============================================
# 使用方法: 复制此文件为 aidoc.conf，填入你的 API Key
#
#   cp aidoc.openai.example.conf aidoc.conf
#   vim aidoc.conf  # 填入 api_key
#
# 优先级: CLI 参数 > 配置文件 > 默认值

[llm]
# LLM 后端: openai
api = openai

# 模型名称
# 推荐: gpt-4o-mini（性价比高）、gpt-4o（最强）
model = gpt-4o-mini

# API 地址
# OpenAI 官方: https://api.openai.com/v1
# Azure OpenAI: https://YOUR_RESOURCE.openai.azure.com/openai/deployments/YOUR_DEPLOYMENT
# 第三方兼容: 填入对应地址（如 OpenRouter、LiteLLM 等）
api_url = https://api.openai.com/v1

# API Key（必填）
# 也可通过环境变量 OPENAI_API_KEY 设置，避免明文存储
api_key = sk-your-api-key-here

# 生成参数
temperature = 0.3
timeout = 60
